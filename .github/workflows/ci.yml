name: CI

# Every PR (any base) and every push to main is gated on: it typechecks, the
# unit + integration suite is green, and the app builds. Nothing merges red.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Prisma client generates into a gitignored dir; tsc and the build
      # both need it present first.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      # One suite today covers both true unit tests (lib/*) and route-level
      # integration tests (API handlers over a mocked Prisma). Real-DB
      # integration is tracked in docs/superpowers/plans/2026-07-22-testing-and-ci-plan.md.
      - name: Unit + integration tests
        run: npx vitest run

      # Smoke: the whole app must compile and build. Dummy secrets satisfy the
      # fail-closed boot checks; they are not real and grant no access.
      - name: Build (smoke)
        run: npx next build
        env:
          SESSION_SECRET: ci-not-a-real-secret
          CRM_PASSWORD: ci-not-a-real-password
          DATABASE_URL: file:./data/ci.db

  lint:
    name: Lint (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      # Report-only for now: main still carries pre-existing no-explicit-any
      # debt (task L1 in the testing-and-CI plan). The step surfaces issues as a
      # warning annotation but exits 0 on purpose — a RED check must always mean
      # a real, blocking failure. Flip this to a plain `npx eslint .` once the
      # debt is cleared, to make lint gate.
      - name: ESLint (report-only)
        run: npx eslint . || echo "::warning title=ESLint (report-only)::lint found issues — non-blocking; tracked as task L1 in docs/superpowers/plans/2026-07-22-testing-and-ci-plan.md"

  docs-check:
    name: Docs updated (report-only)
    # Only meaningful on PRs, where there is a base branch to diff against.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need the base branch present to diff against it
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # Standing rule: docs are updated with every PR. Report-only for now — the
      # step emits a ::warning:: annotation when product code moved without any
      # docs change, but exits 0 on purpose so a RED check always means a real,
      # blocking failure. The PR template carries the human checklist. Flip to
      # gating by setting DOCS_CHECK_STRICT=1 (and dropping the `|| true`) once
      # the convention has bedded in.
      - name: Check docs were updated
        env:
          DOCS_CHECK_BASE: origin/${{ github.base_ref }}
        run: node scripts/check-docs-updated.mjs || true
