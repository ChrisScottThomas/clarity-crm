name: CI

# Every PR (any base) and every push to main is gated on: it typechecks, the
# unit + integration suite is green, and the app builds. Nothing merges red.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Prisma client generates into a gitignored dir; tsc and the build
      # both need it present first.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      # One suite today covers both true unit tests (lib/*) and route-level
      # integration tests (API handlers over a mocked Prisma). Real-DB
      # integration is tracked in docs/superpowers/plans/2026-07-22-testing-and-ci-plan.md.
      - name: Unit + integration tests
        run: npx vitest run

      # Smoke: the whole app must compile and build. Dummy secrets satisfy the
      # fail-closed boot checks; they are not real and grant no access.
      - name: Build (smoke)
        run: npx next build
        env:
          SESSION_SECRET: ci-not-a-real-secret
          CRM_PASSWORD: ci-not-a-real-password
          DATABASE_URL: file:./data/ci.db

  lint:
    name: Lint (report-only)
    runs-on: ubuntu-latest
    # Non-blocking for now: main still carries pre-existing no-explicit-any
    # debt. Cleaning that up so this can gate is a task in the testing-and-CI
    # plan. Until then the report is visible without blocking every PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: ESLint
        run: npx eslint .
