name: CI

# Every PR (any base) and every push to main is gated on: it typechecks, the
# unit + integration suite is green, and the app builds. Nothing merges red.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Test · Build (${{ matrix.provider }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: sqlite
            database-url: file:./data/ci.db
          - provider: postgres
            database-url: postgres://postgres:ci@localhost:5432/clarity
    env:
      DATABASE_URL: ${{ matrix.database-url }}
    # The service container runs on both legs (GitHub Actions cannot make
    # services conditional per matrix entry); the sqlite leg simply ignores it.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: clarity
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # One generated client per provider (spike finding): the wrapper reads
      # DATABASE_URL, rewrites the schema's provider line, generates, restores.
      - name: Generate Prisma client (${{ matrix.provider }})
        run: npm run db:generate

      - name: Typecheck
        run: npx tsc --noEmit

      # One suite today covers both true unit tests (lib/*) and route-level
      # integration tests (API handlers over a mocked Prisma). Real-DB
      # integration is tracked in docs/superpowers/plans/2026-07-22-testing-and-ci-plan.md.
      - name: Unit + integration tests
        run: npx vitest run

      # Apply the schema to a real database and prove CRUD through the
      # generated client — keeps the spike's portability finding continuously
      # verified on both providers.
      - name: Apply schema (db push)
        run: mkdir -p data && npm run db:push

      - name: DB smoke (create/read/delete)
        run: npm run db:smoke

      # Smoke: the whole app must compile and build. Dummy secrets satisfy the
      # fail-closed boot checks; they are not real and grant no access.
      - name: Build (smoke)
        run: npx next build
        env:
          SESSION_SECRET: ci-not-a-real-secret
          CRM_PASSWORD: ci-not-a-real-password

  lint:
    name: Lint (report-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate # sqlite default; lint needs the client present, any provider will do
      # Report-only for now: main still carries pre-existing no-explicit-any
      # debt (task L1 in the testing-and-CI plan). The step surfaces issues as a
      # warning annotation but exits 0 on purpose — a RED check must always mean
      # a real, blocking failure. Flip this to a plain `npx eslint .` once the
      # debt is cleared, to make lint gate.
      - name: ESLint (report-only)
        run: npx eslint . || echo "::warning title=ESLint (report-only)::lint found issues — non-blocking; tracked as task L1 in docs/superpowers/plans/2026-07-22-testing-and-ci-plan.md"

  docs-check:
    name: Docs updated (report-only)
    # Only meaningful on PRs, where there is a base branch to diff against.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # need the base branch present to diff against it
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      # Standing rule: docs are updated with every PR. Report-only for now — the
      # step emits a ::warning:: annotation when product code moved without any
      # docs change, but exits 0 on purpose so a RED check always means a real,
      # blocking failure. The PR template carries the human checklist. Flip to
      # gating by setting DOCS_CHECK_STRICT=1 (and dropping the `|| true`) once
      # the convention has bedded in.
      - name: Check docs were updated
        env:
          DOCS_CHECK_BASE: origin/${{ github.base_ref }}
        run: node scripts/check-docs-updated.mjs || true

  # The phase exit criterion, made checkable: "a clean fork yields a running
  # instance" is asserted here rather than claimed in a README.
  docker:
    name: Docker · boot smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      # One image per provider — the client is compiled into the bundle, so a
      # single image cannot serve both (spike R1).
      - name: Build sqlite image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: DB_PROVIDER=sqlite
          tags: clarity-crm:sqlite
          cache-from: type=gha,scope=sqlite
          cache-to: type=gha,mode=max,scope=sqlite

      - name: Build postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: DB_PROVIDER=postgres
          tags: clarity-crm:postgres
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      # Compose reads .env from the repo root. Dummy values satisfy the
      # fail-closed boot checks; they are not real and grant no access.
      - name: Write CI secrets file
        run: |
          {
            echo "SESSION_SECRET=ci-not-a-real-secret"
            echo "CRM_PASSWORD=ci-not-a-real-password"
            echo "POSTGRES_PASSWORD=ci-not-a-real-password"
          } > .env

      # Both stacks reuse the images built above, so neither invocation
      # rebuilds. Logs are dumped on failure — a silent boot smoke is useless.
      - name: Boot smoke — SQLite
        run: |
          docker compose up -d
          ./scripts/wait-for-health.sh http://localhost:3000/api/health 90 \
            || { docker compose logs; exit 1; }
          docker compose down -v

      - name: Boot smoke — Postgres
        run: |
          docker compose -f docker-compose.postgres.yml up -d
          ./scripts/wait-for-health.sh http://localhost:3000/api/health 120 \
            || { docker compose -f docker-compose.postgres.yml logs; exit 1; }
          docker compose -f docker-compose.postgres.yml down -v

      # Regression test for the exact failure the spike found: a sqlite-built
      # image handed a Postgres URL must refuse to boot. Without this, P3-6 is
      # an unverified promise — and the failure it guards against is invisible
      # (the app serves /login with a 200 and 500s every query).
      - name: Provider mismatch must fail closed
        run: |
          if docker run --rm \
              -e DATABASE_URL="postgres://u:p@nowhere:5432/clarity" \
              -e SESSION_SECRET=ci-not-a-real-secret \
              -e CRM_PASSWORD=ci-not-a-real-password \
              clarity-crm:sqlite; then
            echo "::error::sqlite image accepted a Postgres URL — P3-6 is broken"
            exit 1
          fi
          echo "provider mismatch correctly rejected"

      # Regression test for the review's F1/F2/F4. Next CATCHES a throw from the
      # instrumentation hook, logs an unhandledRejection and keeps the port
      # bound — so the container used to sit there Running=true, exit code 0,
      # serving 500s, having already run `db push` against a live database.
      # Compose's ${VAR:?} guards hid this; `docker run` and Railway had no gate.
      # The entrypoint preflight must exit non-zero, and must do so BEFORE the
      # schema step. Both halves are asserted here.
      - name: Missing secret must fail closed, before touching the database
        run: |
          set +e
          out="$(docker run --rm -e CRM_PASSWORD=ci-not-a-real-password clarity-crm:sqlite 2>&1)"
          code=$?
          set -e
          echo "$out"
          if [ "$code" -eq 0 ]; then
            echo "::error::container booted without SESSION_SECRET (exit 0) — the preflight is broken"
            exit 1
          fi
          if echo "$out" | grep -q "applying schema"; then
            echo "::error::db push ran before the config was validated"
            exit 1
          fi
          echo "missing SESSION_SECRET correctly rejected with exit $code, before db push"

      - name: Invalid DATABASE_POOL_MAX must fail closed
        run: |
          if docker run --rm \
              -e SESSION_SECRET=ci-not-a-real-secret \
              -e CRM_PASSWORD=ci-not-a-real-password \
              -e DATABASE_POOL_MAX=abc \
              clarity-crm:sqlite; then
            echo "::error::container booted with DATABASE_POOL_MAX=abc"
            exit 1
          fi
          echo "invalid DATABASE_POOL_MAX correctly rejected"
